# DXVK 성능 최적화 설정
# ~/.wine-msworlds/drive_c/dxvk.conf 에 복사

# 프레임 레이턴시 최소화 (입력 지연 감소)
dxvk.maxFrameLatency = 1

# 셰이더 컴파일 스레드 (0 = 모든 코어 사용)
dxvk.numCompilerThreads = 0

# 그래픽 파이프라인 라이브러리 (RADV 지원)
dxvk.enableGraphicsPipelineLibrary = True

# 메모리 디프래그먼테이션
dxvk.enableMemoryDefrag = True

# 상태 캐시 활성화 (재실행 시 셰이더 스터터링 방지)
dxvk.enableStateCache = True

# D3D11 동적 리소스 캐싱 (iGPU 성능 향상)
d3d11.cachedDynamicResources = "a"
